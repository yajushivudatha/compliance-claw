version: "3.9"

services:
  compliance-agent:
    build: .
    container_name: criterion-compliance-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - USE_MOCK_DATA=true
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./reports:/app/reports
      - ./scans.db:/app/scans.db
      - huggingface_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  huggingface_cache: