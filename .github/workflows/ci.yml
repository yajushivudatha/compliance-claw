name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install langchain langchain-community langchain-groq langchain-huggingface langchain-chroma langchain-text-splitters langgraph langsmith chromadb pypdf pymupdf sentence-transformers reportlab python-dotenv requests mcp httpx-sse fastapi uvicorn pytest pytest-cov httpx

      - name: Run tests with coverage
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "false"
          USE_MOCK_DATA: "true"
          K8S_MCP_URL: "http://mock-mcp-server/sse"
          READYOPS_TOKEN: "test-token-123"